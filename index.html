<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>

<body>
 <div class="container">
    <form>
        <div class="mb-3">
            <label for="InputName" class="form-label">Name</label>
            <input type="text" class="form-control" id="InputName" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
          </div>
          <div class="mb-3">
            <label for="subject" class="form-label">subject</label>
            <input type="text" class="form-control" id="subject" aria-describedby="emailHelp">
          </div>
        <div class="mb-3">
          <label for="InputEmail1" class="form-label">Email address</label>
          <input type="email" class="form-control" id="InputEmail1" aria-describedby="emailHelp">
          <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
       
       
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
 </div>
    <button type="button" id="readEmailButton">Read</button>
    <h1>Readdata</h1>
    <div id="data">

    </div>

</body>

<script>
    var data=document.getElementById('data');
  
    Office.onReady((info) => {
        var hold=Office.context.mailbox.item;
        console.log(Office.context.mailbox.item)
        if (info.host === Office.HostType.Outlook) {
            document.getElementById("readEmailButton").onclick = sayHello;
        }
    });

 
   async function sayHello() {
        Office.context.mailbox.item.body.getAsync("text", function(result) {
            console.log(Office.context.mailbox.item)
        if (result.status === Office.AsyncResultStatus.Succeeded) {
            let Email=document.getElementById('InputEmail1')
            let InputName=document.getElementById('InputName')
            let subject=document.getElementById('subject')
            Email.value=Office.context.mailbox.item.from.emailAddress
            InputName.value=Office.context.mailbox.item.from.displayName;
            subject.value=Office.context.mailbox.item.subject;
        } else {
            console.error("Error reading email body: " + result.error.message);
        }
    })
}

</script>

</html>
