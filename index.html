<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <button type="button" id="readEmailButton">Read</button>
    <h1>Readdata</h1>
    <div id="data">

    </div>

</body>

<script>
    var data=document.getElementById('data');
  
    Office.onReady((info) => {
        var hold=Office.context.mailbox.item;
        console.log(Office.context.mailbox.item)
        if (info.host === Office.HostType.Outlook) {
            document.getElementById("readEmailButton").onclick = sayHello;
        }
    });

 
   async function sayHello() {
       document.getElementById("data").innerHTML(Office.context.mailbox.item.body.displayName) 
    })
}

</script>

</html>
