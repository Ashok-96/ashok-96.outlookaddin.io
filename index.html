<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>

<body>
 <div class="container">
    <div class="card">
        <div class="card-header">
            <h3 class="text-center">Create Lead</h3>
       
        </div>
        <div class="card-body">
            <form>
                <div class="mb-3">
                    <label for="InputName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="InputName" required>
                  </div>
                  <div class="mb-3">
                    <label for="subject" class="form-label">subject</label>
                    <input type="text" class="form-control" id="subject" required>
                  </div>
                <div class="mb-3">
                  <label for="InputEmail1" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="InputEmail1" required>
                </div>
                <div class="mb-3">
                    <label for="phoneman" class="form-label">Phone</label>
                        <input type="number"  class="form-control d-none" name="phone" id="phoneman" required>
                    <select class="form-control" name="phone" id="phonelist" required>
                        <option value=''>--select--from--list</option>
                        
                    </select>
                
                  </div>
                  <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea  class="form-control" rows="15" id="message" ></textarea>
                  </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Username</label>
                    <input type="tel" class="form-control" id="username" required placeholder="Enter Your Paramantra's Username" required>
                  </div>
                <button type="submit" class="btn btn-primary">Submit</button>
              </form>
        </div>
    </div>
   
   
 </div>
  

</body>

<script>
    var data=document.getElementById('data');
    var Email=document.getElementById('InputEmail1')
    var InputName=document.getElementById('InputName')
    var subject=document.getElementById('subject')
     var phone=document.getElementById('phone')
    var message=document.getElementById('message')
    Office.onReady((info) => {
        var hold=Office.context.mailbox.item;
       
        if (info.host === Office.HostType.Outlook) {
              Email.value=Office.context.mailbox.item.from.emailAddress
            InputName.value=Office.context.mailbox.item.from.displayName;
            subject.value=Office.context.mailbox.item.subject;
        Office.context.mailbox.item.body.getAsync("text", function(result) {
          
        if (result.status === Office.AsyncResultStatus.Succeeded) {
          
            message.value=result.value;
             var string =  message.value
            var getNum = string.match(/(\d+)/g);
          
            if(getNum.length==1){
                  phone.val=getNum[0];
            }else if(getNum.length>1){
                for(let i=0;i<getNum.length-1;i++){
                    $('#phonelist').append(`<option value="${getNum[i]}">${getNum[i]}</option>`)
                }
                 $('#phonelist').append(`<option value='na'>Not in list</option>`);
            }
        } else {
            console.error("Error reading email body: " + result.error.message);
        }
    })
        }
    });

 


</script>

</html>
